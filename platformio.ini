; ============================================================================
;  PlatformIO project configuration for the LilyGO T-Display S3 Pro
;  (ESP32-S3R8: 16MB flash / 8MB PSRAM, ST7796 display, CST226SE touch)
;
;  Docs for every option: https://docs.platformio.org/en/latest/projectconf/
;
;  HOW THIS FILE IS ORGANISED
;  --------------------------
;  * [env]      : a SHARED base. Every environment below inherits its
;                 single-value options (chip, flash, USB) automatically.
;                 NOTE: for LIST options (build_flags, lib_deps) a child that
;                 redefines them REPLACES the base, so where a lesson needs the
;                 base values it pulls them back in with ${env.build_flags} /
;                 ${env.lib_deps}. That is why you see those ${...} references.
;  * [common]   : re-usable bundles (the LVGL flags, individual library names)
;                 referenced by lessons that need them. Not an environment, so
;                 it is never built on its own.
;  * [env:NAME] : one environment per lesson. Each one compiles ONLY that
;                 lesson's folder and pulls in ONLY the libraries that lesson
;                 actually #includes -- so building a lesson is exactly as lean
;                 as it was when you first wrote it (no LVGL/XPowers noise).
;
;  HOW TO FLASH A LESSON
;  --------------------------
;      pio run -e lesson-03b-fading-trail -t upload            # build + flash
;      pio run -e lesson-03b-fading-trail -t upload -t monitor # + serial
;      pio run -t upload                                       # your live src/
; ============================================================================


; ---------------------------------------------------------------------------
;  Project-wide settings
; ---------------------------------------------------------------------------
[platformio]
; A bare `pio run` (no -e) builds your current working code in src/.
default_envs = tdisplay-s3-pro


; ---------------------------------------------------------------------------
;  SHARED BASE -- inherited by every environment
; ---------------------------------------------------------------------------
[env]
; --- Which chip family + build system ---
;  We use the community "pioarduino" platform because it ships the MODERN
;  ESP32 Arduino core (3.x); the official platform stalled on the legacy 2.0.x.
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board     = esp32-s3-devkitm-1 ; a generic ESP32-S3 board profile that fits this hardware
framework = arduino          ; use the Arduino API layer (setup()/loop(), Serial, etc.)

; --- Flash chip settings (must match the 16MB on this board) ---
board_build.mcu        = esp32s3
board_build.flash_size = 16MB
board_upload.flash_size = 16MB

; --- Memory type: QIO flash + OPI (octal) PSRAM ---
;  The ESP32-S3R8 has 8MB of *octal* PSRAM. Enabling it needs the right
;  flash+PSRAM combo. "qio_opi" = QIO flash, OPI PSRAM. Without this (and the
;  BOARD_HAS_PSRAM flag below) the 8MB stays dark and large allocations fail.
board_build.arduino.memory_type = qio_opi

; --- Speed of the serial monitor (must match Serial.begin() in the code) ---
monitor_speed = 115200

; --- Build flags common to EVERY lesson ---
;  These put Serial on the native USB-C port and enable the 8MB PSRAM.
build_flags =
	-DARDUINO_USB_MODE=1        ; use the built-in USB peripheral
	-DARDUINO_USB_CDC_ON_BOOT=1 ; expose it as a serial port at startup
	-DBOARD_HAS_PSRAM           ; tell the Arduino core this board has PSRAM (enables it)

; --- The one library EVERY lesson uses (the display driver) ---
lib_deps =
	moononournation/GFX Library for Arduino


; ---------------------------------------------------------------------------
;  RE-USABLE BUNDLES (referenced by the lesson envs; never built directly)
; ---------------------------------------------------------------------------
[common]
; Extra flags LVGL needs: find our hand-written lv_conf.h in include/.
lvgl_flags =
	-DLV_CONF_INCLUDE_SIMPLE
	-I include

; Individual libraries, named once so the lessons below stay tidy.
lib_sensor  = lewisxhe/SensorLib      ; CST226SE touch + LTR-553 light sensor
lib_lvgl    = lvgl/lvgl @ ^9.3.0      ; the widget toolkit (Stage 4); v9, hand-coded UI
lib_xpowers = lewisxhe/XPowersLib     ; SY6970 PMU / battery charger driver (Stage 5)


; ===========================================================================
;  DEFAULT ENVIRONMENT -- your current, live code in src/
;  (top of the ladder: display + touch + LVGL + power management)
; ===========================================================================
[env:tdisplay-s3-pro]
build_flags =
	${env.build_flags}
	${common.lvgl_flags}
lib_deps =
	${env.lib_deps}
	${common.lib_sensor}
	${common.lib_lvgl}
	${common.lib_xpowers}


; ===========================================================================
;  PER-LESSON ENVIRONMENTS
;  Each `build_src_filter` line means: compile NOTHING from src/ ( -<*> ),
;  then compile ONLY this lesson's folder ( +<../docs/lesson-.../> ).
; ===========================================================================

; --- Tier A: display only (GFX) ---------------------------------------------
[env:lesson-01-first-light]
build_src_filter = -<*> +<../docs/lesson-01-first-light/>
; needs only the base GFX library -- nothing extra

; --- Tier B: display + touch (GFX + SensorLib) ------------------------------
[env:lesson-02-touch]
build_src_filter = -<*> +<../docs/lesson-02-touch/>
lib_deps =
	${env.lib_deps}
	${common.lib_sensor}

[env:lesson-03-interactive]
build_src_filter = -<*> +<../docs/lesson-03-interactive/>
lib_deps =
	${env.lib_deps}
	${common.lib_sensor}

[env:lesson-03b-fading-trail]
build_src_filter = -<*> +<../docs/lesson-03b-fading-trail/>
lib_deps =
	${env.lib_deps}
	${common.lib_sensor}

; --- Tier C: + LVGL (GFX + SensorLib + LVGL) --------------------------------
[env:lesson-04-lvgl]
build_src_filter = -<*> +<../docs/lesson-04-lvgl/>
build_flags =
	${env.build_flags}
	${common.lvgl_flags}
lib_deps =
	${env.lib_deps}
	${common.lib_sensor}
	${common.lib_lvgl}

; --- Tier D: + power management (GFX + SensorLib + LVGL + XPowers) -----------
;  Stages 5 onward add the PMU, and later the SD card, camera, Wi-Fi, HTTP and
;  BLE -- but those last five ship *inside* the ESP32 Arduino core, so they
;  need no extra lib_deps. The dependency set is identical for all of them.
[env:lesson-05-battery]
build_src_filter = -<*> +<../docs/lesson-05-battery/>
build_flags =
	${env.build_flags}
	${common.lvgl_flags}
lib_deps =
	${env.lib_deps}
	${common.lib_sensor}
	${common.lib_lvgl}
	${common.lib_xpowers}

